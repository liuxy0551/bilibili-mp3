version: '3.8'

services:
  frontend:
    image: registry.cn-hangzhou.aliyuncs.com/liuxy0551/bilibili-mp3-frontend:latest
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

  backend:
    image: registry.cn-hangzhou.aliyuncs.com/liuxy0551/bilibili-mp3-backend:latest
    ports:
      - "3000:3000"
    volumes:
      - downloads:/app/downloads
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DOWNLOAD_DIR=/app/downloads
    networks:
      - app-network
    restart: unless-stopped

volumes:
  downloads:

networks:
  app-network:
    driver: bridge
